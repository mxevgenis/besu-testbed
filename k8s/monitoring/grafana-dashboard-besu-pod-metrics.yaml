apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-besu-pod-metrics
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  besu-pod-metrics.json: |
    {
      "uid": "besu-pod-metrics",
      "title": "Besu Pod Metrics (Validators + RPC)",
      "timezone": "utc",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "tags": ["besu", "pods", "kubernetes"],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus", "value": "Prometheus" }
          },
          {
            "name": "pod",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
            "query": "label_values(container_cpu_usage_seconds_total{namespace=\"blockchain\",pod=~\"validator.*|rpc-node.*\"}, pod)",
            "current": { "text": "All", "value": ".*" }
          }
        ]
      },
      "panels": [
        {
          "type": "timeseries",
          "title": "CPU Usage (cores)",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"blockchain\",pod=~\"$pod\",container!=\"POD\"}[5m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Memory Usage (bytes)",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"blockchain\",pod=~\"$pod\",container!=\"POD\"})",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Network Receive (bytes/s)",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_network_receive_bytes_total{namespace=\"blockchain\",pod=~\"$pod\"}[5m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Network Transmit (bytes/s)",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_network_transmit_bytes_total{namespace=\"blockchain\",pod=~\"$pod\"}[5m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Filesystem Used (bytes)",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (pod) (container_fs_usage_bytes{namespace=\"blockchain\",pod=~\"$pod\",container!=\"POD\"})",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Disk Read Throughput (bytes/s)",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_fs_reads_bytes_total{namespace=\"blockchain\",pod=~\"$pod\",container!=\"POD\"}[5m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Disk Write Throughput (bytes/s)",
          "gridPos": { "x": 0, "y": 24, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_fs_writes_bytes_total{namespace=\"blockchain\",pod=~\"$pod\",container!=\"POD\"}[5m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
