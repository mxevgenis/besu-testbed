apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-besu-node-metrics
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  besu-node-metrics.json: |
    {
      "uid": "besu-node-metrics",
      "title": "Besu Node Metrics (Kubernetes Nodes)",
      "timezone": "utc",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "tags": ["besu", "nodes", "kubernetes"],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus", "value": "Prometheus" }
          },
          {
            "name": "node",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
            "query": "label_values(node_cpu_seconds_total, instance)",
            "current": { "text": "All", "value": ".*" }
          }
        ]
      },
      "panels": [
        {
          "type": "timeseries",
          "title": "vCPU Utilization (%)",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "100 * (1 - avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\",instance=~\"$node\"}[5m])))",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Disk Read Throughput (bytes/s)",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (instance) (rate(node_disk_read_bytes_total{instance=~\"$node\"}[5m]))",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Disk Write Throughput (bytes/s)",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (instance) (rate(node_disk_written_bytes_total{instance=~\"$node\"}[5m]))",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Disk IO Time (%)",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "100 * sum by (instance) (rate(node_disk_io_time_seconds_total{instance=~\"$node\"}[5m]))",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Filesystem Used (bytes)",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (instance) (node_filesystem_size_bytes{instance=~\"$node\",fstype!~\"tmpfs|overlay|squashfs\"} - node_filesystem_avail_bytes{instance=~\"$node\",fstype!~\"tmpfs|overlay|squashfs\"})",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Network Receive (bytes/s)",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (instance) (rate(node_network_receive_bytes_total{instance=~\"$node\",device!~\"lo\"}[5m]))",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Network Transmit (bytes/s)",
          "gridPos": { "x": 0, "y": 24, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (instance) (rate(node_network_transmit_bytes_total{instance=~\"$node\",device!~\"lo\"}[5m]))",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
