apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: blockchain-discord-alerts
  namespace: blockchain
  labels:
    release: monitoring
spec:
  route:
    receiver: blockchain-discord
    groupBy:
      - alertname
      - severity
      - namespace
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    matchers:
      - name: alert_scope
        matchType: "="
        value: blockchain
      - name: severity
        matchType: "=~"
        value: "warning|critical"
  receivers:
    - name: blockchain-discord
      discordConfigs:
        - apiURL:
            name: blockchain-discord-alerts
            key: webhookUrl
          username: web3edu-testbed-alerts
          title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
          message: |
            Channel: #web3edu-testbed
            Namespace: {{ .CommonLabels.namespace }}
            Severity: {{ .CommonLabels.severity }}
            {{ range .Alerts -}}
            Summary: {{ .Annotations.summary }}
            Description: {{ .Annotations.description }}
            {{ end }}
          sendResolved: true
