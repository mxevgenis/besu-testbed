apiVersion: v1
kind: Service
metadata:
  name: rpc-node
  namespace: blockchain
spec:
  clusterIP: None
  selector:
    app: rpc-node
  ports:
  - name: p2p
    port: 30303
  - name: rpc-http
    port: 8545
  - name: rpc-ws
    port: 8546
  - name: metrics
    port: 9545
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rpc-node
  namespace: blockchain
spec:
  serviceName: rpc-node
  replicas: 1
  selector:
    matchLabels:
      app: rpc-node
  template:
    metadata:
      labels:
        app: rpc-node
    spec:
      containers:
      - name: besu
        image: hyperledger/besu:25.8.0
        command:
        - /bin/sh
        - /scripts/besu-startup.sh
        args:
        - --genesis-file=/config/genesis.json
        - --data-path=/data
        - --network-id=1337
        - --sync-mode=FULL
        - --sync-min-peers=1
        - --node-private-key-file=/keys/key
        - --min-gas-price=0
        - --rpc-http-enabled
        - --rpc-http-host=0.0.0.0
        - --rpc-http-port=8545
        - --rpc-http-api=ETH,NET,WEB3,ADMIN,TXPOOL,DEBUG,TRACE,QBFT
        - --rpc-ws-enabled
        - --rpc-ws-host=0.0.0.0
        - --rpc-ws-port=8546
        - --host-allowlist=*
        - --p2p-host=0.0.0.0
        - --p2p-port=30303
        - --metrics-enabled
        - --metrics-host=0.0.0.0
        - --metrics-port=9545
        ports:
        - containerPort: 30303
          name: p2p
        - containerPort: 8545
          name: rpc-http
        - containerPort: 8546
          name: rpc-ws
        - containerPort: 9545
          name: metrics
        readinessProbe:
          tcpSocket:
            port: 8545
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 8545
          initialDelaySeconds: 60
          periodSeconds: 20
        volumeMounts:
        - name: config
          mountPath: /config
        - name: data
          mountPath: /data
        - name: keys
          mountPath: /keys
        - name: startup-script
          mountPath: /scripts
      volumes:
      - name: config
        configMap:
          name: besu-genesis
      - name: keys
        secret:
          secretName: rpc-node-secret
      - name: startup-script
        configMap:
          name: besu-startup-script
          defaultMode: 0755
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: blockchain-local
      resources:
        requests:
          storage: 90Gi
