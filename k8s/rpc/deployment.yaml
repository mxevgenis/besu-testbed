apiVersion: apps/v1
kind: Deployment
metadata:
  name: besu-rpc
  namespace: blockchain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: besu-rpc
  template:
    metadata:
      labels:
        app: besu-rpc
    spec:
      containers:
        - name: besu
          image: hyperledger/besu:25.8.0
          args:
            - --genesis-file=/config/genesis.json
            - --data-path=/data
            - --network-id=2026
            - --sync-mode=FULL
            - --miner-enabled=false
            - --rpc-http-enabled
            - --rpc-http-host=0.0.0.0
            - --rpc-http-api=ETH,NET,WEB3,ADMIN,TXPOOL,DEBUG,TRACE,QBFT
            - --rpc-ws-enabled
            - --rpc-ws-host=0.0.0.0
            - --host-allowlist=*
            - --bootnodes=enode://bfed695ffb406c6953878b37d97a708af6817e6d8a0384485dcdbab581d1f96469341541abf8b2e808bd34e15406aa42a2dfa0a6d4d9eba098e56938a982db13@validator1-0.validator1.blockchain.svc.cluster.local:30303,enode://f41078e727cea6eee2880df29ad783fcceadcab8f1a7df519731f6881d38c38635db07e796dae3488b14077eac3ffda20a1fd5b80a07b884de992f19f7b0a141@validator2-0.validator2.blockchain.svc.cluster.local:30303,enode://733baae591c4c31a97b3b558cb7983da6e218e64bcaf07b5fca08d3df24ab631061dfda47d8c03cd85542a1f7ad6f96f5b97696bff82294d38d299fa6add8003@validator3-0.validator3.blockchain.svc.cluster.local:30303
            - --metrics-enabled
            - --metrics-host=0.0.0.0
          ports:
            - containerPort: 8545
            - containerPort: 8546
            - containerPort: 9545
          volumeMounts:
            - name: data
              mountPath: /data
            - name: genesis
              mountPath: /config
      volumes:
        - name: data
          emptyDir: {}
        - name: genesis
          configMap:
            name: besu-genesis
