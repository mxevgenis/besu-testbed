apiVersion: v1
kind: Service
metadata:
  name: besu-rpc-service
  namespace: blockchain
spec:
  type: NodePort
  selector:
    app: besu-rpc
  ports:
    - name: http
      port: 8545
      targetPort: 8545
      nodePort: 30045
    - name: ws
      port: 8546
      targetPort: 8546
      nodePort: 30046
