apiVersion: v1
kind: Secret
metadata:
  name: blockscout-secrets
  namespace: blockchain
type: Opaque
stringData:
  SECRET_KEY_BASE: change-me-please
---
apiVersion: v1
kind: Service
metadata:
  name: blockscout
  namespace: blockchain
spec:
  selector:
    app: blockscout
  ports:
  - name: http
    port: 80
    targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockscout
  namespace: blockchain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blockscout
  template:
    metadata:
      labels:
        app: blockscout
    spec:
      initContainers:
      - name: db-migrate
        image: blockscout/blockscout:6.8.0
        command:
        - /bin/sh
        - -lc
        - /app/bin/blockscout eval "Elixir.Explorer.ReleaseTasks.create_and_migrate()"
        env:
        - name: DATABASE_URL
          value: postgresql://blockscout:blockscout@blockscout-db:5432/blockscout?ssl=false
        - name: ECTO_USE_SSL
          value: "false"
        - name: SECRET_KEY_BASE
          valueFrom:
            secretKeyRef:
              name: blockscout-secrets
              key: SECRET_KEY_BASE
      containers:
      - name: blockscout
        image: blockscout/blockscout:6.8.0
        command:
        - /bin/sh
        - -lc
        - /app/bin/blockscout start
        ports:
        - containerPort: 4000
          name: http
        env:
        - name: DATABASE_URL
          value: postgresql://blockscout:blockscout@blockscout-db:5432/blockscout?ssl=false
        - name: ECTO_USE_SSL
          value: "false"
        - name: SECRET_KEY_BASE
          valueFrom:
            secretKeyRef:
              name: blockscout-secrets
              key: SECRET_KEY_BASE
        - name: ETHEREUM_JSONRPC_HTTP_URL
          value: http://rpc-node:8545
        - name: ETHEREUM_JSONRPC_WS_URL
          value: ws://rpc-node:8546
        - name: ETHEREUM_JSONRPC_TRACE_URL
          value: http://rpc-node:8545
        - name: ETHEREUM_JSONRPC_VARIANT
          value: besu
        - name: CHAIN_ID
          value: "1337"
        - name: NETWORK
          value: besu-qbft
        - name: SUBNETWORK
          value: local
        - name: COIN
          value: ETH
        - name: PORT
          value: "4000"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
